<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProsperApp - Tablero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar {
            background: #e8731a;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: white; font-size: 20px; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .container { padding: 16px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h2 { color: #333; }
        .btn-volver {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            display: block;
            margin-bottom: 8px;
        }
        .tablero {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 16px;
            -webkit-overflow-scrolling: touch;
        }
        .columna {
            background: #e4e6ea;
            border-radius: 12px;
            padding: 16px;
            min-width: 220px;
            max-width: 280px;
        }
        .columna-header {
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .tarjeta {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            font-size: 14px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tarjeta a {
            color: #333;
            text-decoration: none;
            flex: 1;
        }
        .tarjeta a:hover { color: #e8731a; }
        .btn-eliminar {
            background: none;
            border: none;
            color: #cc0000;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
        }
        .btn-eliminar:hover { color: #ff0000; }
        .vacia {
            color: #999;
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }
        .form-nueva {
            margin-top: 12px;
            background: white;
            border-radius: 8px;
            padding: 12px;
        }
        .form-nueva input, .form-nueva textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
            font-family: Arial, sans-serif;
        }
        .form-nueva textarea { height: 60px; resize: none; }
        .btn-agregar {
            width: 100%;
            padding: 8px;
            background: #e8731a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-agregar:hover { background: #cf6215; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🚀 ProsperApp</h1>
        <a href="/logout">Cerrar sesión</a>
    </div>

    <div class="container">
        <div class="header">
            <div>
                <a href="/proyectos" class="btn-volver">← Volver a mis proyectos</a>
                <h2>📦 {{ proyecto[0] }}</h2>
            </div>
        </div>

        <div class="tablero">
            {% for seccion, funcionalidades in tablero.items() %}
            <div class="columna">
                <div class="columna-header">{{ seccion[1] }}</div>

                {% if funcionalidades %}
                    {% for f in funcionalidades %}
                    <div class="tarjeta">
                        <a href="/funcionalidad/{{ f[0] }}">🔧 {{ f[1] }}</a>
                        <form method="POST" action="/funcionalidad/{{ f[0] }}/eliminar">
                            <input type="hidden" name="id_proyecto" value="{{ id_proyecto }}">
                            <button type="submit" class="btn-eliminar">🗑️</button>
                        </form>
                    </div>
                    {% endfor %}
                {% else %}
                    <div class="vacia">Sin funcionalidades</div>
                {% endif %}

                <div class="form-nueva">
                    <form method="POST" action="/seccion/{{ seccion[0] }}/funcionalidad/nueva">
                        <input type="hidden" name="id_proyecto" value="{{ id_proyecto }}">
                        <input type="text" name="titulo" placeholder="Título de la funcionalidad" required>
                        <textarea name="historia" placeholder="Historia de usuario..."></textarea>
                        <textarea name="notas" placeholder="Notas de diseño..."></textarea>
                        <button type="submit" class="btn-agregar">+ Agregar</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
